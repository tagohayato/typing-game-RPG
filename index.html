<script>
// ===== Audio =====
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==="suspended") AC.resume(); }
let bgmPlaying=false, bgmTimers=[], bgmOscs=[];
function stopBGM(){ bgmOscs.forEach(o=>{try{o.stop();}catch(e){}});bgmOscs=[]; bgmTimers.forEach(t=>clearTimeout(t));bgmTimers=[]; }
function playBGM(){
  stopBGM();
  const bpm=126, b=60/bpm;
  const bass=[110,110,123,110,110,110,98,110];
  const mel=[0,330,0,392,0,349,330,0,0,294,0,330,0,262,294,0];
  const loopSec=mel.length*b;
  function sched(t0){
    bass.forEach((f,i)=>{
      const o=AC.createOscillator(),g=AC.createGain();
      o.connect(g);g.connect(AC.destination);
      o.type="triangle";o.frequency.value=f;
      const t=t0+i*b*2;
      g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+b*1.8);
      o.start(t);o.stop(t+b*2);bgmOscs.push(o);
    });
    mel.forEach((f,i)=>{
      if(!f)return;
      const o=AC.createOscillator(),g=AC.createGain();
      o.connect(g);g.connect(AC.destination);
      o.type="square";o.frequency.value=f;
      const t=t0+i*b;
      g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+b*0.8);
      o.start(t);o.stop(t+b);bgmOscs.push(o);
    });
    const tid=setTimeout(()=>{if(bgmPlaying)sched(t0+loopSec);},(loopSec-0.2)*1000);
    bgmTimers.push(tid);
  }
  sched(AC.currentTime+0.05);
}
function toggleBGM(){
  bgmPlaying=!bgmPlaying;
  document.getElementById("bgm-btn").textContent=bgmPlaying?"🔊":"🔇";
  if(bgmPlaying)playBGM();else stopBGM();
}
function tone(freq,type,dur,vol=0.25){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);
}
const sndAttack=()=>{tone(660,"square",0.07,0.2);setTimeout(()=>tone(440,"square",0.09,0.15),55);};
const sndMiss=()=>{tone(160,"sawtooth",0.12,0.28);setTimeout(()=>tone(110,"sawtooth",0.12,0.18),55);};
const sndDefeat=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,"triangle",0.12,0.25),i*65));};
const sndClear=()=>{[523,523,523,415,523,0,659,0,784].forEach((f,i)=>setTimeout(()=>{if(f>0)tone(f,"triangle",0.22,0.35);},i*130));};
const sndGameover=()=>{[440,349,294,220,196].forEach((f,i)=>setTimeout(()=>tone(f,"sawtooth",0.18,0.28),i*110));};
const sndCombo=()=>{tone(880,"sine",0.07,0.18);setTimeout(()=>tone(1100,"sine",0.09,0.18),50);};

// ===== ローマ字→かな 変換テーブル =====
// キーポイント：1文字ずつキーを受け取り、バッファが確定できるかを判定する
// テーブルは「ローマ字文字列 → かな文字列」のマップ（長い順に格納）
const TABLE = [
  // 4文字
  ["ltsu","っ"],["xtsu","っ"],
  // 3文字（拗音系）
  ["sha","しゃ"],["shi","し"],["shu","しゅ"],["she","しぇ"],["sho","しょ"],
  ["chi","ち"],["cha","ちゃ"],["chu","ちゅ"],["che","ちぇ"],["cho","ちょ"],
  ["tsu","つ"],

  ["tya","ちゃ"],["tyi","ちぃ"],["tyu","ちゅ"],["tye","ちぇ"],["tyo","ちょ"],

  ["hya","ひゃ"],["hyi","ひぃ"],["hyu","ひゅ"],["hye","ひぇ"],["hyo","ひょ"],
  ["mya","みゃ"],["myi","みぃ"],["myu","みゅ"],["mye","みぇ"],["myo","みょ"],
  ["rya","りゃ"],["ryi","りぃ"],["ryu","りゅ"],["rye","りぇ"],["ryo","りょ"],
  ["lya","ゃ"],["lyi","ぃ"],["lyu","ゅ"],["lye","ぇ"],["lyo","ょ"],
  ["gya","ぎゃ"],["gyi","ぎぃ"],["gyu","ぎゅ"],["gye","ぎぇ"],["gyo","ぎょ"],
  ["zya","じゃ"],["zyi","じぃ"],["zyu","じゅ"],["zye","じぇ"],["zyo","じょ"],
  ["jya","じゃ"],["jyi","じぃ"],["jyu","じゅ"],["jye","じぇ"],["jyo","じょ"],
  ["bya","びゃ"],["byi","びぃ"],["byu","びゅ"],["bye","びぇ"],["byo","びょ"],
  ["pya","ぴゃ"],["pyi","ぴぃ"],["pyu","ぴゅ"],["pye","ぴぇ"],["pyo","ぴょ"],
  ["dya","ぢゃ"],["dyi","ぢぃ"],["dyu","ぢゅ"],["dye","ぢぇ"],["dyo","ぢょ"],
  ["dha","でゃ"],["dhi","でぃ"],["dhu","でゅ"],["dhe","でぇ"],["dho","でょ"],

  ["twa","とぁ"],["twi","とぃ"],["twu","とぅ"],["twe","とぇ"],["two","とぉ"],
  ["dwa","どぁ"],["dwi","どぃ"],["dwu","どぅ"],["dwe","どぇ"],["dwo","どぉ"],
  ["fya","ふゃ"],["fyu","ふゅ"],["fyo","ふょ"],
  ["fwa","ふぁ"],["fwi","ふぃ"],["fwu","ふぅ"],["fwe","ふぇ"],["fwo","ふぉ"],
  ["vya","ゔゃ"],["vyu","ゔゅ"],["vyo","ゔょ"],
  ["xya","ゃ"],["xyu","ゅ"],["xyo","ょ"],
  ["ltu","っ"],["xtu","っ"],
  ["lwa","ゎ"],["xwa","ゎ"],
  // 2文字
  ["ka","か"],["ki","き"],["ku","く"],["ke","け"],["ko","こ"],
  ["sa","さ"],["si","し"],["su","す"],["se","せ"],["so","そ"],
  ["ta","た"],["ti","ち"],["tu","つ"],["te","て"],["to","と"],
  ["na","な"],["ni","に"],["nu","ぬ"],["ne","ね"],["no","の"],
  ["ha","は"],["hi","ひ"],["hu","ふ"],["he","へ"],["ho","ほ"],
  ["ma","ま"],["mi","み"],["mu","む"],["me","め"],["mo","も"],
  ["ya","や"],["yi","い"],["yu","ゆ"],["ye","いぇ"],["yo","よ"],
  ["ra","ら"],["ri","り"],["ru","る"],["re","れ"],["ro","ろ"],
  ["la","ぁ"],["li","ぃ"],["lu","ぅ"],["le","ぇ"],["lo","ぉ"],
  ["wa","わ"],["wi","ゐ"],["we","ゑ"],["wo","を"],
  ["ga","が"],["gi","ぎ"],["gu","ぐ"],["ge","げ"],["go","ご"],
  ["za","ざ"],["zi","じ"],["zu","ず"],["ze","ぜ"],["zo","ぞ"],
  ["ja","じゃ"],["ji","じ"],["ju","じゅ"],["je","じぇ"],["jo","じょ"],
  ["da","だ"],["di","ぢ"],["du","づ"],["de","で"],["do","ど"],
  ["ba","ば"],["bi","び"],["bu","ぶ"],["be","べ"],["bo","ぼ"],
  ["pa","ぱ"],["pi","ぴ"],["pu","ぷ"],["pe","ぺ"],["po","ぽ"],
  ["fa","ふぁ"],["fi","ふぃ"],["fu","ふ"],["fe","ふぇ"],["fo","ふぉ"],
  ["va","ゔぁ"],["vi","ゔぃ"],["vu","ゔ"],["ve","ゔぇ"],["vo","ゔぉ"],
  ["ca","か"],["ci","し"],["cu","く"],["ce","せ"],["co","こ"],
  ["qa","くぁ"],["qi","くぃ"],["qu","く"],["qe","くぇ"],["qo","くぉ"],
  ["xa","ぁ"],["xi","ぃ"],["xu","ぅ"],["xe","ぇ"],["xo","ぉ"],
  // 1文字
  ["a","あ"],["i","い"],["u","う"],["e","え"],["o","お"],
];

// かな配列の最初の1文字（または拗音・っ・ん）に対応するすべての有効なローマ字表記のリストを返す
function getValidSpellingsForKana(kana) {
  if (!kana) return [];
  const results = [];
  if (kana.startsWith("っ")) {
    results.push("ltu", "xtu", "ltsu", "xtsu");
    // 次の文字の子音を重ねるパターン
    const rest = kana.slice(1);
    if (rest) {
      const nextSpellings = getValidSpellingsForKana(rest);
      for (const s of nextSpellings) {
        if (s && !"aiueoyn".includes(s[0])) {
          results.push(s[0] + s);
        }
      }
    }
  } else if (kana.startsWith("ん")) {
    results.push("nn", "n'");
    const rest = kana.slice(1);
    if (rest) {
      const nextSpellings = getValidSpellingsForKana(rest);
      for (const s of nextSpellings) {
        if (s && !"aiueoyn".includes(s[0])) {
          results.push("n" + s);
        }
      }
    } else {
      results.push("n");
    }
  } else {
    for (const [r, k] of TABLE) {
      if (kana.startsWith(k)) {
        results.push(r);
      }
    }
  }
  return results;
}

// 入力バッファ buf が targetKana の有効なローマ字プレフィックスであるかを判定する
function isValidRomanPrefixForKana(buf, kana) {
  if (buf === "") return true;
  if (kana === "") return false;

  // ① 「っ」の判定
  if (kana.startsWith("っ")) {
    const tsuSpellings = ["ltu", "xtu", "ltsu", "xtsu"];
    for (const s of tsuSpellings) {
      if (s.startsWith(buf)) return true;
      if (buf.startsWith(s)) {
        if (isValidRomanPrefixForKana(buf.slice(s.length), kana.slice(1))) {
          return true;
        }
      }
    }
    const restKana = kana.slice(1);
    if (restKana.length > 0) {
      const nextSpellings = getValidSpellingsForKana(restKana);
      for (const s of nextSpellings) {
        const firstChar = s[0];
        if (firstChar && !"aiueoyn".includes(firstChar)) {
          if (buf === firstChar) return true;
          if (buf.startsWith(firstChar)) {
            const restBuf = buf.slice(1);
            if (s.startsWith(restBuf) && isValidRomanPrefixForKana(restBuf, restKana)) {
              return true;
            }
          }
        }
      }
    }
  }

  // ② 「ん」の判定
  if (kana.startsWith("ん")) {
    const nSpellings = ["nn", "n'"];
    for (const s of nSpellings) {
      if (s.startsWith(buf)) return true;
      if (buf.startsWith(s)) {
        if (isValidRomanPrefixForKana(buf.slice(s.length), kana.slice(1))) {
          return true;
        }
      }
    }
    if (buf.startsWith("n")) {
      const restBuf = buf.slice(1);
      if (restBuf === "") return true;
      const restKana = kana.slice(1);
      if (restKana.length > 0) {
        const nextSpellings = getValidSpellingsForKana(restKana);
        for (const s of nextSpellings) {
          const firstChar = s[0];
          if (firstChar && !"aiueoyn".includes(firstChar)) {
            if (restBuf.startsWith(firstChar) || firstChar.startsWith(restBuf)) {
              if (isValidRomanPrefixForKana(restBuf, restKana)) {
                return true;
              }
            }
          }
        }
      }
    }
  }

  // ③ 通常のかな判定
  for (const [r, k] of TABLE) {
    if (kana.startsWith(k)) {
      if (r.startsWith(buf)) return true;
      if (buf.startsWith(r)) {
        if (isValidRomanPrefixForKana(buf.slice(r.length), kana.slice(k.length))) {
          return true;
        }
      }
    }
  }

  return false;
}

// バッファ + 次のかな文字 を渡して、確定できるなら {kana, remaining} を返す
// 確定できない（まだ入力待ち）なら null を返す
// 変換不能（ミス）なら false を返す
function tryConvert(buf, curKana, nextKana){
  if(!buf) return null;

  // ① っ: 同子音2連 (n以外)
  if(buf.length>=2 && buf[0]===buf[1] && buf[0]!=="n" && /[bcdfghjklmpqrstvwxyz]/.test(buf[0])){
    return { kana:"っ", remaining: buf.slice(1) };
  }

  // ② ん系
  if(buf==="nn"||buf==="n'") return { kana:"ん", remaining:"" };
  if(buf[0]==="n" && buf.length>=2 && !"aiueoyn".includes(buf[1])){
    // n + 子音 → ん確定（その子音はそのまま残す）
    return { kana:"ん", remaining: buf.slice(1) };
  }
  if(buf==="n"){
    // 判定対象が「ん」の場合のみ確定、それ以外（「ね」「な」等のn始まり）は次の文字の入力を待つ
    if(curKana==="ん"){
      if(!nextKana) return { kana:"ん", remaining:"" };
    }
    return null;
  }

  // ③ TABLE を長い順にフルマッチ検索
  // バッファ長より長いエントリが「前方一致」している場合はまだ待つ
  const exact = TABLE.filter(([r])=> r===buf);
  const longer = TABLE.filter(([r])=> r.length>buf.length && r.startsWith(buf));

  if(exact.length>0 && longer.length===0){
    // 完全一致のみ → 確定
    return { kana: exact[0][1], remaining:"" };
  }
  if(exact.length>0 && longer.length>0){
    // 完全一致もあるが、より長いマッチの可能性もある → 次のキー次第
    // ここは「今の長さで確定」とする（次キーで longer にマッチする可能性は次バッファで処理）
    return { kana: exact[0][1], remaining:"" };
  }
  if(longer.length>0){
    // 前方一致のみ → まだ待つ
    return null;
  }

  // 何にもマッチしない → false（ミス）
  return false;
}

// ===== かな→代表ローマ字（表示用） =====
const DISP={
  "あ":"a","い":"i","う":"u","え":"e","お":"o",
  "か":"ka","き":"ki","く":"ku","け":"ke","こ":"ko",
  "さ":"sa","し":"shi","す":"su","せ":"se","そ":"so",
  "た":"ta","ち":"chi","つ":"tsu","て":"te","と":"to",

function kanaToRoman(kana, limit = kana.length){
  let r="",i=0;
  while(i<limit){
    if(kana[i]==="っ"){
      const two=kana.slice(i+1,i+3),one=kana[i+1];
      const p=DISP[two]||DISP[one]||"x";
      r+=p[0]; i++; continue;
    }
    if(kana[i]==="ん"){
      const nx=kana[i+1];
      if(nx){
        const two=kana.slice(i+1,i+3);
        const nxR=DISP[two]||DISP[nx]||"";
        r+=(nxR&&"aiueoyn".includes(nxR[0]))?"nn":"n";
      } else r+="n";
      i++; continue;
    }
    const two=kana.slice(i,i+2);
    if(i+1 < limit && DISP[two]){r+=DISP[two];i+=2;continue;}
    if(DISP[kana[i]]){r+=DISP[kana[i]];i++;continue;}
    r+=kana[i];i++;
  }
  return r;
}

// ===== レベル・経験値システム =====
// Lv1基礎HP=120, レベルごとに+15HP
const BASE_HP = 120;
const HP_PER_LV = 15;
// レベルアップに必要な累計EXP: Lv1→2=100, Lv2→3=150, ... (×1.4倍ずつ)
function expToNext(lv){ return Math.floor(100 * Math.pow(1.4, lv-1)); }
function calcMaxHp(lv){ return BASE_HP + (lv-1)*HP_PER_LV; }
// レベルによる固定攻撃ダメージ: Lv1=5, レベルごとに+1
function calcAttackDmg(lv){ return 4 + lv; }

// ストレージキー
const SAVE_KEY = "typing_rpg_hero";

let hero = { lv:1, exp:0 }; // 永続データ

async function loadHero(){
  try {
    const r = await window.storage.get(SAVE_KEY);
    if(r && r.value){
      const d = JSON.parse(r.value);
      hero = { lv: d.lv||1, exp: d.exp||0 };
    }
  } catch(e){ hero={lv:1,exp:0}; }
  renderHeroStatus();
}
async function saveHero(){
  try { await window.storage.set(SAVE_KEY, JSON.stringify(hero)); } catch(e){}
}
async function resetHeroData(){
  if(!confirm("勇者データを初期化しますか？（Lv.1に戻ります）")) return;
  hero={lv:1,exp:0};
  await saveHero();
  renderHeroStatus();
  // HPも初期値に戻す
  state.playerHp = calcMaxHp(1);
  renderHp();
}

function addExp(amount){
  hero.exp += amount;
  let leveled = false;
  while(hero.exp >= expToNext(hero.lv)){
    hero.exp -= expToNext(hero.lv);
    hero.lv++;
    leveled = true;
  }
  if(leveled){
    // レベルアップ時はHPを全回復
    state.playerHp = calcMaxHp(hero.lv);
    tone(523,"triangle",0.1,0.3);setTimeout(()=>tone(659,"triangle",0.1,0.3),100);
    setTimeout(()=>tone(784,"triangle",0.15,0.35),200);setTimeout(()=>tone(1047,"triangle",0.2,0.4),320);
    setMsg(`⭐ LEVEL UP! Lv.${hero.lv} 最大HP +${HP_PER_LV}！`,"good");
    const hs=document.getElementById("hero-status");
    hs.classList.remove("levelup-flash");void hs.offsetWidth;hs.classList.add("levelup-flash");
  }
  saveHero();
  renderHeroStatus();
}

function renderHeroStatus(){
  const lv=hero.lv, exp=hero.exp, need=expToNext(lv), maxhp=calcMaxHp(lv);
  document.getElementById("hero-lv").textContent=`Lv.${lv}`;
  document.getElementById("exp-label-right").textContent=`${exp} / ${need}`;
  document.getElementById("exp-bar").style.width=(exp/need*100)+"%";
  document.getElementById("hero-maxhp-label").textContent=maxhp;
  document.getElementById("hero-atk-label").textContent=calcAttackDmg(lv);
}

const COMBO_HEAL=5,COMBO_REQ=3;
let state={},romanBuf="",kanaPos=0;
let timerRaf=null, timerStart=0, timerElapsed=0;
const $=id=>document.getElementById(id);
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const pick=(pool,n)=>shuffle(pool).slice(0,Math.min(n,pool.length));

function startTimer(){
  stopTimer();
  timerStart=performance.now();
  timerElapsed=0;
  tickTimer();
}
function stopTimer(){
  if(timerRaf){cancelAnimationFrame(timerRaf);timerRaf=null;}
}
function tickTimer(){
  if(state.done){stopTimer();return;}
  const s=STAGES[state.stage];
  const now=performance.now();
  timerElapsed=(now-timerStart)/1000;
  const remaining=Math.max(0,s.timerSec-timerElapsed);
  const pct=(remaining/s.timerSec)*100;
  const bar=$("timer-bar");
  bar.style.width=pct+"%";
  bar.className="timer-bar-fill "+(pct>50?"safe":pct>25?"warn":"");
  $("timer-sec").textContent=remaining.toFixed(1)+"秒";
  if(timerElapsed>=s.timerSec){
    // 敵の攻撃！
    onTimerDamage();
    // タイマーリセット
    timerStart=performance.now();
    timerElapsed=0;
  }
  timerRaf=requestAnimationFrame(tickTimer);
}
function onTimerDamage(){
  const s=STAGES[state.stage];
  state.playerHp-=s.timerDmg;
  state.combo=0;$("combo-msg").textContent="";
  animSprite("player-sprite");sndMiss();
  $("word-display-box").style.outline="2px solid #E24B4A";
  setTimeout(()=>$("word-display-box").style.outline="",400);
  setMsg(`⚡ 敵の攻撃！ -${s.timerDmg} HP`,"bad");
  renderHp();
  if(state.playerHp<=0){
    state.done=true;stopTimer();sndGameover();
    showOverlay("ゲームオーバー",`${STAGES[state.stage].name}に敗れた…`,"もう一度挑戦");
  }
}

function initStage(idx){
  const s=STAGES[idx];
  const maxHp=calcMaxHp(hero.lv);
  state={stage:idx,playerHp:state.playerHp??maxHp,enemyHp:s.maxHp,enemyMaxHp:s.maxHp,
    words:shuffle(pick(s.wordPool,s.count)),wordIdx:0,combo:0,done:false};
  // playerHpが現在のmaxHpを超えないようにキャップ
  state.playerHp=Math.min(state.playerHp,maxHp);
  const db=`<span class="diff-badge" style="background:${s.diffColor}22;color:${s.diffColor};border:0.5px solid ${s.diffColor}66">${s.diffLabel}</span>`;
  $("stage-label").innerHTML=`ステージ ${idx+1} / ${STAGES.length} ${db}`;
  $("enemy-name").textContent=s.name;
  $("enemy-sprite").textContent=s.sprite;
  renderHp();nextWord();setMsg("","");$("overlay").style.display="none";
  startTimer();
}
function renderHp(){
  const maxHp=calcMaxHp(hero.lv);
  const ph=Math.max(0,state.playerHp),eh=Math.max(0,state.enemyHp);
  $("player-hp-fill").style.width=(ph/maxHp*100)+"%";
  $("enemy-hp-fill").style.width=(eh/state.enemyMaxHp*100)+"%";
  $("player-hp-label").textContent=ph+" / "+maxHp;
  $("enemy-hp-label").textContent=eh+" / "+state.enemyMaxHp;
}
function nextWord(){
  if(state.wordIdx>=state.words.length){state.words=shuffle(pick(STAGES[state.stage].wordPool,STAGES[state.stage].count));state.wordIdx=0;}
  const w=state.words[state.wordIdx++];
  state.currentWord=w;romanBuf="";kanaPos=0;
  $("word-kanji").textContent=w.kanji;
  $("word-kana-small").textContent=w.kana;
  renderDisplay();
}
function renderDisplay(){
  const kana=state.currentWord.kana;
  let kh="";
  for(let i=0;i<kana.length;i++){
    if(i<kanaPos) kh+=`<span class="kana-done">${kana[i]}</span>`;
    else if(i===kanaPos) kh+=`<span class="kana-cur">${kana[i]}</span>`;
    else kh+=`<span class="kana-pending">${kana[i]}</span>`;
  }
  $("kana-display").innerHTML=kh||"—";
  const done=kanaToRoman(kana, kanaPos);
  const pending=kanaToRoman(kana.slice(kanaPos));
  let rh="";
  for(let c of done) rh+=`<span class="seg-done">${c}</span>`;
  for(let c of romanBuf) rh+=`<span class="seg-done">${c}</span>`;
  const rest=pending.slice(romanBuf.length);
  if(rest.length>0){
    rh+=`<span class="seg-cur">${rest[0]}</span>`;
    for(let i=1;i<rest.length;i++) rh+=`<span class="seg-pending">${rest[i]}</span>`;
  }
  $("roman-display").innerHTML=rh||"—";
}
function setMsg(t,type){const el=$("msg-bar");el.textContent=t;el.className="msg-bar"+(type?" "+type:"");}
function animSprite(id){const el=$(id);el.style.transform="scale(1.3)";setTimeout(()=>el.style.transform="",150);}
function showOverlay(t,s,b){$("overlay-title").textContent=t;$("overlay-sub").textContent=s;$("overlay-btn").textContent=b;$("overlay").style.display="flex";}

function onMiss(){
  $("word-display-box").style.outline="2px solid #E24B4A";
  setTimeout(()=>$("word-display-box").style.outline="",300);
  animSprite("player-sprite");sndMiss();
  setMsg(`ミス！`,"bad");
  romanBuf="";renderDisplay();
}
function onComplete(){
  const dmg=calcAttackDmg(hero.lv);
  state.enemyHp-=dmg;state.combo++;
  animSprite("enemy-sprite");romanBuf="";kanaPos=0;
  // ワード完成でタイマーリセット
  timerStart=performance.now();timerElapsed=0;
  // 経験値獲得（ステージ番号に応じて増加）
  const expGain = 10 + state.stage * 5;
  addExp(expGain);
  const maxHp=calcMaxHp(hero.lv);
  if(state.combo>=COMBO_REQ){
    state.playerHp=Math.min(maxHp,state.playerHp+COMBO_HEAL);
    $("combo-msg").textContent=`${state.combo}コンボ！ HP +${COMBO_HEAL}`;
    setMsg(`撃破！ -${dmg} / +${expGain}EXP / コンボ回復！`,"good");sndCombo();
  } else {
    $("combo-msg").textContent=state.combo>1?`${state.combo}コンボ！`:"";
    setMsg(`撃破！ -${dmg} ダメージ / +${expGain}EXP`,"good");sndAttack();
  }
  renderHp();
  if(state.enemyHp<=0){
    state.done=true;stopTimer();
    // ステージクリアボーナス経験値
    const bonusExp = 50 + state.stage * 30;
    addExp(bonusExp);
    if(state.stage+1>=STAGES.length){
      sndClear();stopBGM();bgmPlaying=false;$("bgm-btn").textContent="🔇";
      showOverlay("🎉 全ステージクリア！",`魔王ダークロスを打ち倒し\n世界に真の平和が訪れた！\nクリアボーナス +${bonusExp}EXP`,"最初から遊ぶ");
    } else {
      sndDefeat();
      showOverlay(`ステージ ${state.stage+1} クリア！`,`次の強敵： ${STAGES[state.stage+1].name}\nクリアボーナス +${bonusExp}EXP`,"次のステージへ");
    }
    return;
  }
  nextWord();
}

document.addEventListener("keydown",e=>{
  if(state.done) return;
  if($("overlay").style.display!=="none"){if(e.key==="Enter")$("overlay-btn").click();return;}
  if(e.key.length!==1||!/[a-z']/i.test(e.key)) return;
  e.preventDefault();resumeAC();
  const ch=e.key.toLowerCase();
  const kana=state.currentWord.kana;
  const newBuf=romanBuf+ch;
  const curKana=kana[kanaPos];
  const nextKana=kana[kanaPos+1]||null;
  const result=tryConvert(newBuf,curKana,nextKana);

  if(result===false){ onMiss(); return; }
  if(result===null){
    // まだ待つ。ただし前方一致チェック
    if(!isValidRomanPrefixForKana(newBuf, kana.slice(kanaPos))){ onMiss(); return; }
    romanBuf=newBuf; renderDisplay(); return;
  }
  // 確定
  if(!kana.slice(kanaPos).startsWith(result.kana)){ onMiss(); return; }
  kanaPos+=result.kana.length;
  romanBuf=result.remaining;
  // remainingをさらに変換
  while(romanBuf.length>0&&kanaPos<kana.length){
    const r2=tryConvert(romanBuf,kana[kanaPos],kana[kanaPos+1]||null);
    if(!r2||r2===false||!kana.slice(kanaPos).startsWith(r2.kana)) break;
    kanaPos+=r2.kana.length;romanBuf=r2.remaining;
  }
  renderDisplay();
  if(kanaPos>=kana.length) setTimeout(()=>onComplete(),0);
});

$("overlay-btn").addEventListener("click",function(){
  resumeAC();
  if(!bgmPlaying){bgmPlaying=true;$("bgm-btn").textContent="🔊";playBGM();}
  if(this.textContent==="次のステージへ") initStage(state.stage+1);
  else{
    // 最初から or もう一度挑戦: HP全回復して再スタート
    state.playerHp = calcMaxHp(hero.lv);
    initStage(0);
  }
});
$("bgm-btn").addEventListener("click",()=>{resumeAC();toggleBGM();});

// 起動時にセーブデータ読み込み
loadHero();
</script>
