<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
</head>

<body>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap');

    :root {
      --bg: #0a0a1a;
      --panel: #12122a;
      --border: #4a4a8a;
      --accent: #6868d4;
      --gold: #f0c040;
      --green: #40d060;
      --red: #e04040;
      --orange: #f08020;
      --white: #e8e8f8;
      --gray: #6868a8;
      --darkgray: #2a2a4a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      background: var(--bg);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ドット風ボーダー：擬似的に太い2px solid + inset shadow で "枠" 感を出す */
    .dot-box {
      border: 3px solid var(--border);
      box-shadow: inset 0 0 0 1px var(--accent), 3px 3px 0 #000;
      background: var(--panel);
      image-rendering: pixelated;
    }

    #game {
      padding: 0.75rem 0;
      user-select: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      background: var(--bg);
      color: var(--white);
      border-radius: 4px;
      padding: 28px;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    /* ステージバナー */
    .stage-banner {
      text-align: center;
      font-size: 13px;
      color: var(--gold);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      text-shadow: 1px 1px 0 #000;
    }

    /* 勇者ステータス */
    .hero-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      margin-bottom: 12px;
    }

    .hero-lv {
      font-size: 13px;
      color: var(--gold);
      white-space: nowrap;
      text-shadow: 1px 1px 0 #000;
    }

    .exp-wrap {
      flex: 1;
    }

    .exp-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .exp-bar-bg {
      height: 11px;
      background: var(--darkgray);
      border: 2px solid var(--border);
      overflow: hidden;
    }

    .exp-bar-fill {
      height: 100%;
      background: var(--gold);
      transition: width 0.4s steps(20);
    }

    .stat-item {
      font-size: 10px;
      color: var(--gray);
      white-space: nowrap;
    }

    .stat-item span {
      color: var(--white);
    }

    .reset-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--gray);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 7px;
      cursor: pointer;
      white-space: nowrap;
    }

    .reset-btn:hover {
      color: var(--red);
      border-color: var(--red);
    }

    /* バトルエリア */
    .battle-area {
      padding: 16px;
      margin-bottom: 12px;
    }

    .fighters {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .fighter {
      flex: 1;
    }

    .fighter-name {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 6px;
      text-shadow: 1px 1px 0 #000;
      font-family: 'DotGothic16', monospace;
    }

    .hp-bar-bg {
      height: 14px;
      background: var(--darkgray);
      border: 2px solid var(--border);
      overflow: hidden;
      margin-bottom: 3px;
    }

    .hp-bar-fill {
      height: 100%;
      transition: width 0.3s steps(10);
    }

    .hp-label {
      font-size: 10px;
      color: var(--gray);
      text-align: right;
    }

    .player-hp .hp-bar-fill {
      background: var(--green);
    }

    .enemy-hp .hp-bar-fill {
      background: var(--red);
    }

    .enemy-hp .hp-label {
      text-align: left;
    }

    /* スプライト行 */
    .sprite-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 10px;
      min-height: 112px;
    }

    .sprite {
      width: 112px;
      height: 112px;
      line-height: 1;
      transition: transform 0.1s steps(2);
      image-rendering: pixelated;
      filter: drop-shadow(3px 3px 0 #000);
    }

    .sprite svg {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      shape-rendering: crispEdges;
    }

    /* コンボゲージ */
    .combo-wrap {
      padding: 6px 10px;
      margin-bottom: 8px;
    }

    .combo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .combo-label {
      font-size: 9px;
      color: var(--gray);
    }

    .combo-count {
      font-size: 9px;
      color: var(--gold);
    }

    .combo-track {
      display: flex;
      gap: 3px;
      height: 12px;
    }

    .combo-seg {
      flex: 1;
      background: var(--darkgray);
      border: 1px solid var(--border);
    }

    .combo-seg.lit-1 {
      background: #d4c040;
      border-color: #f0e060;
    }

    .combo-seg.lit-2 {
      background: #e08020;
      border-color: #f0a030;
    }

    .combo-seg.lit-3 {
      background: #e03030;
      border-color: #ff5050;
    }

    .combo-seg.pulse {
      animation: combo-pulse 0.3s steps(3);
    }

    @keyframes combo-pulse {
      0% {
        opacity: 0.3
      }

      50% {
        opacity: 1
      }

      100% {
        opacity: 0.3
      }
    }

    .combo-lv-badge {
      text-align: center;
      font-size: 9px;
      min-height: 16px;
      color: var(--gold);
      text-shadow: 1px 1px 0 #000;
      margin-top: 2px;
    }

    /* タイマー */
    .timer-wrap {
      margin-bottom: 12px;
    }

    .timer-label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--gray);
      margin-bottom: 4px;
    }

    .timer-bar-bg {
      height: 14px;
      background: var(--darkgray);
      border: 2px solid var(--border);
      overflow: hidden;
    }

    .timer-bar-fill {
      height: 100%;
      transition: width 0.1s linear;
    }

    .timer-bar-fill.safe {
      background: var(--green);
    }

    .timer-bar-fill.warn {
      background: var(--orange);
    }

    .timer-bar-fill.danger {
      background: var(--red);
    }

    /* 単語表示 */
    .word-display {
      padding: 18px 14px;
      margin-bottom: 10px;
      text-align: center;
    }

    .word-kanji {
      font-size: 30px;
      color: var(--white);
      margin-bottom: 10px;
      text-shadow: 2px 2px 0 #000;
      font-family: 'DotGothic16', monospace;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .word-kana-small {
      font-size: 13px;
      color: var(--gray);
      margin-bottom: 14px;
      font-family: 'DotGothic16', monospace;
    }

    .kana-display {
      font-size: 24px;
      letter-spacing: 0.15em;
      margin-bottom: 12px;
      min-height: 32px;
      font-family: 'DotGothic16', monospace;
    }

    .roman-display {
      font-family: 'Press Start 2P', monospace;
      font-size: 15px;
      letter-spacing: 0.08em;
      min-height: 28px;
      word-break: break-all;
      line-height: 1.8;
    }

    .kana-done {
      color: var(--green);
    }

    .kana-cur {
      color: var(--white);
      font-weight: 700;
      border-bottom: 4px solid var(--accent);
    }

    .kana-pending {
      color: #444468;
    }

    .seg-done {
      color: var(--green);
    }

    .seg-cur {
      color: var(--white);
      border-bottom: 4px solid var(--gold);
    }

    .seg-pending {
      color: #444468;
    }

    /* メッセージ */
    .msg-bar {
      min-height: 24px;
      font-size: 13px;
      color: var(--gray);
      text-align: center;
      margin-bottom: 6px;
      text-shadow: 1px 1px 0 #000;
      font-family: 'DotGothic16', monospace;
    }

    .msg-bar.good {
      color: var(--green);
    }

    .msg-bar.bad {
      color: var(--red);
    }

    /* オーバーレイ */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 5, 0.85);
      border: 4px solid var(--gold);
      box-shadow: inset 0 0 0 1px var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 2rem;
    }

    .overlay-title {
      font-size: 20px;
      color: var(--gold);
      text-shadow: 2px 2px 0 #000;
      text-align: center;
      line-height: 1.6;
    }

    .overlay-sub {
      font-size: 15px;
      color: var(--white);
      text-align: center;
      line-height: 2.2;
      white-space: pre-line;
      text-shadow: 1px 1px 0 #000;
      font-family: 'DotGothic16', monospace;
    }

    .overlay button {
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: var(--bg);
      background: var(--gold);
      border: 4px solid #000;
      box-shadow: 4px 4px 0 #000;
      padding: 12px 28px;
      cursor: pointer;
      transition: transform 0.05s, box-shadow 0.05s;
    }

    .overlay button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #000;
    }

    /* diff バッジ */
    .diff-badge {
      display: inline-block;
      font-size: 10px;
      padding: 3px 8px;
      border: 1px solid;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* BGMボタン */
    .bgm-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--gold);
      background: none;
      border: 1px solid var(--border);
      padding: 3px 6px;
      cursor: pointer;
      opacity: 0.8;
      vertical-align: middle;
      margin-left: 8px;
      text-shadow: 1px 1px 0 #000;
    }
    .bgm-btn:hover {
      opacity: 1;
      border-color: var(--gold);
    }

    /* レベルアップフラッシュ */
    .levelup-flash {
      animation: lvflash 0.7s steps(4);
    }

    @keyframes lvflash {
      0% {
        background: var(--panel);
      }

      25% {
        background: #2a2a10;
      }

      50% {
        background: #3a3a05;
      }

      75% {
        background: #2a2a10;
      }

      100% {
        background: var(--panel);
      }
    }

    .game-wrap {
      position: relative;
    }

    /* ブリンクカーソル風 */
    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .seg-cur {
      animation: blink 0.8s steps(1) infinite;
    }
  </style>

  <div id="game">
    <div class="stage-banner">
      <span id="stage-label">ステージ 1 / 8</span>
      <button class="bgm-btn" id="bgm-btn">♪OFF</button>

    <div class="hero-status dot-box" id="hero-status">
      <div class="hero-lv" id="hero-lv">Lv.1</div>
      <div class="exp-wrap">
        <div class="exp-label"><span>EXP</span><span id="exp-label-right">0 / 100</span></div>
        <div class="exp-bar-bg">
          <div class="exp-bar-fill" id="exp-bar" style="width:0%"></div>
        </div>
      </div>
      <div class="stat-item">HP <span id="hero-maxhp-label">120</span></div>
      <div class="stat-item">ATK <span id="hero-atk-label">5</span></div>
      <button class="reset-btn" onclick="resetHeroData()">RESET</button>
    </div>
    <div class="game-wrap">
      <div class="battle-area dot-box">
        <div class="fighters">
          <div class="fighter player-hp">
            <div class="fighter-name">▶ 勇者</div>
            <div class="hp-bar-bg">
              <div class="hp-bar-fill" id="player-hp-fill" style="width:100%"></div>
            </div>
            <div class="hp-label" id="player-hp-label">120 / 120</div>
          </div>
          <div class="fighter enemy-hp">
            <div class="fighter-name" id="enemy-name" style="text-align:right"></div>
            <div class="hp-bar-bg">
              <div class="hp-bar-fill" id="enemy-hp-fill" style="width:100%"></div>
            </div>
            <div class="hp-label" id="enemy-hp-label"></div>
          </div>
        </div>
        <div class="sprite-row">
          <div class="sprite" id="player-sprite"></div>
          <div class="sprite" id="enemy-sprite" style="text-align:right"></div>
        </div>
        <div class="combo-badge" id="combo-msg"></div>
      </div>
      <div class="combo-wrap dot-box">
        <div class="combo-header">
          <span class="combo-label">⚡ COMBO</span>
          <span class="combo-count" id="combo-count">0</span>
        </div>
        <div class="combo-track" id="combo-track"></div>
        <div class="combo-lv-badge" id="combo-lv-badge"></div>
      </div>
      <div class="timer-wrap dot-box" style="padding:6px 10px;">
        <div class="timer-label">
          <span>⚡ ENEMY ATK</span>
          <span id="timer-sec">--</span>
        </div>
        <div class="timer-bar-bg">
          <div class="timer-bar-fill safe" id="timer-bar" style="width:100%"></div>
        </div>
      </div>
      <div class="word-display dot-box" id="word-display-box">
        <div class="word-kanji" id="word-kanji">—</div>
        <div class="word-kana-small" id="word-kana-small">—</div>
        <div class="kana-display" id="kana-display">—</div>
        <div class="roman-display" id="roman-display">—</div>
      </div>
      <div class="msg-bar" id="msg-bar"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-title" id="overlay-title">TYPING RPG</div>
        <div class="overlay-sub" id="overlay-sub">全8ステージ、魔王を倒して世界を救え！</div>
        <button id="overlay-btn">► START</button>
      </div>
    </div>
  </div>

  <script>
    // ===== ドット絵スプライト (16x16 pixel art, SVG生成) =====
    function pixelSVG(grid, palette) {
      // grid: 16x16 の文字配列（各文字がpaletteのキー、"."は透明）
      const cell = 16, size = cell * 16;
      let rects = "";
      for (let y = 0; y < grid.length; y++) {
        const row = grid[y];
        for (let x = 0; x < row.length; x++) {
          const c = row[x];
          if (c === "." || !palette[c]) continue;
          rects += `<rect x="${x * cell}" y="${y * cell}" width="${cell}" height="${cell}" fill="${palette[c]}"/>`;
        }
      }
      return `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
    }

    const STAGES = [

    // ===== レベル・経験値システム =====
    // Lv1基礎HP=120, レベルごとに+15HP
    const BASE_HP = 120;
    const HP_PER_LV = 15;
    // レベルアップに必要な累計EXP: Lv1→2=100, Lv2→3=150, ... (×1.4倍ずつ)
    function expToNext(lv) { return Math.floor(100 * Math.pow(1.4, lv - 1)); }
    function calcMaxHp(lv) { return BASE_HP + (lv - 1) * HP_PER_LV; }
    // レベルによる固定攻撃ダメージ: Lv1=5, レベルごとに+1
    function calcAttackDmg(lv) { return 4 + lv; }

    // ストレージキー
    const SAVE_KEY = "typing_rpg_hero";

    let hero = { lv: 1, exp: 0 }; // 永続データ

    // window.storage (アーティファクト環境) があればそちらを優先、
    // なければ localStorage にフォールバックして単体HTMLでも保存できるようにする
    async function loadHero() {
      try {
        if (window.storage && typeof window.storage.get === "function") {
          const r = await window.storage.get(SAVE_KEY);
          if (r && r.value) {
            const d = JSON.parse(r.value);
            hero = { lv: d.lv || 1, exp: d.exp || 0 };
          }
        } else {
          const raw = localStorage.getItem(SAVE_KEY);
          if (raw) {
            const d = JSON.parse(raw);
            hero = { lv: d.lv || 1, exp: d.exp || 0 };
          }
        }
      } catch (e) { hero = { lv: 1, exp: 0 }; }
      renderHeroStatus();
    }
    async function saveHero() {
      try {
        if (window.storage && typeof window.storage.set === "function") {
          await window.storage.set(SAVE_KEY, JSON.stringify(hero));
        } else {
          localStorage.setItem(SAVE_KEY, JSON.stringify(hero));
        }
      } catch (e) {
        // window.storageが失敗した場合もlocalStorageに保存を試みる
        try { localStorage.setItem(SAVE_KEY, JSON.stringify(hero)); } catch (e2) { }
      }
    }
    async function resetHeroData() {
      if (!confirm("勇者データを初期化しますか？（Lv.1に戻ります）")) return;
      hero = { lv: 1, exp: 0 };
      await saveHero();
      renderHeroStatus();
      // HPも初期値に戻す
      state.playerHp = calcMaxHp(1);
      renderHp();

    function addExp(amount) {
      hero.exp += amount;
      let leveled = false;
      while (hero.exp >= expToNext(hero.lv)) {
        hero.exp -= expToNext(hero.lv);
        hero.lv++;
        leveled = true;
      }
      if (leveled) {
        // レベルアップ時はHPを全回復
        state.playerHp = calcMaxHp(hero.lv);
        tone(523, "triangle", 0.1, 0.3); setTimeout(() => tone(659, "triangle", 0.1, 0.3), 100);
        setTimeout(() => tone(784, "triangle", 0.15, 0.35), 200); setTimeout(() => tone(1047, "triangle", 0.2, 0.4), 320);
        setMsg(`⭐ LEVEL UP! Lv.${hero.lv} 最大HP +${HP_PER_LV}！`, "good");
        const hs = document.getElementById("hero-status");
        hs.classList.remove("levelup-flash"); void hs.offsetWidth; hs.classList.add("levelup-flash");
      }
      saveHero();
      renderHeroStatus();
    }

      document.getElementById("hero-lv").textContent = `Lv.${lv}`;
      document.getElementById("exp-label-right").textContent = `${exp} / ${need}`;

      document.getElementById("hero-atk-label").textContent = calcAttackDmg(lv);

    const COMBO_LEVELS = [
      { req: 3, heal: 5, label: "COMBO Lv.1 ＋５HP", colorClass: "lit-1" },
      { req: 6, heal: 15, label: "COMBO Lv.2 ＋15HP", colorClass: "lit-2" },
      { req: 10, heal: 35, label: "COMBO Lv.3 ＋35HP！", colorClass: "lit-3" },

    // 注意: state.combo とは別に state.pureCombo で管理

    let state = {}, romanBuf = "", kanaPos = 0;
    let timerRaf = null, timerStart = 0, timerElapsed = 0;
    const $ = id => document.getElementById(id);
    const shuffle = a => { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; };
    const pick = (pool, n) => shuffle(pool).slice(0, Math.min(n, pool.length));

    function startTimer() {
      stopTimer();
      timerStart = performance.now();
      timerElapsed = 0;
      tickTimer();
    }
    function stopTimer() {
      if (timerRaf) { cancelAnimationFrame(timerRaf); timerRaf = null; }
    }
    function tickTimer() {
      if (state.done) { stopTimer(); return; }
      const s = STAGES[state.stage];
      const now = performance.now();
      timerElapsed = (now - timerStart) / 1000;
      const remaining = Math.max(0, s.timerSec - timerElapsed);
      const pct = (remaining / s.timerSec) * 100;
      const bar = $("timer-bar");
      bar.style.width = pct + "%";
      bar.className = "timer-bar-fill " + (pct > 50 ? "safe" : pct > 20 ? "warn" : "danger");
      $("timer-sec").textContent = remaining.toFixed(1) + "秒";
      if (timerElapsed >= s.timerSec) {
        // 敵の攻撃！
        onTimerDamage();
        // タイマーリセット
        timerStart = performance.now();
        timerElapsed = 0;
      }
      timerRaf = requestAnimationFrame(tickTimer);

    function onTimerDamage() {
      const s = STAGES[state.stage];

      renderHp();

    function initStage(idx) {
      const s = STAGES[idx];

        words: shuffle(pick(s.wordPool, s.count)), wordIdx: 0, pureCombo: 0, done: false

      const db = `<span class="diff-badge" style="background:${s.diffColor}22;color:${s.diffColor};border:0.5px solid ${s.diffColor}66">${s.diffLabel}</span>`;

      if (state.wordIdx >= state.words.length) { state.words = shuffle(pick(STAGES[state.stage].wordPool, STAGES[state.stage].count)); state.wordIdx = 0; }
      const w = state.words[state.wordIdx++];

      $("word-kana-small").textContent = w.kana;

    function renderDisplay() {
      const kana = state.currentWord.kana;
      let kh = "";
      for (let i = 0; i < kana.length; i++) {
        if (i < kanaPos) kh += `<span class="kana-done">${kana[i]}</span>`;
        else if (i === kanaPos) kh += `<span class="kana-cur">${kana[i]}</span>`;
        else kh += `<span class="kana-pending">${kana[i]}</span>`;
      }
      $("kana-display").innerHTML = kh || "—";
      const done = kanaToRoman(kana, kanaPos);
      const pending = kanaToRoman(kana.slice(kanaPos));
      let rh = "";
      for (let c of done) rh += `<span class="seg-done">${c}</span>`;
      for (let c of romanBuf) rh += `<span class="seg-done">${c}</span>`;
      const rest = pending.slice(romanBuf.length);
      if (rest.length > 0) {
        rh += `<span class="seg-cur">${rest[0]}</span>`;
        for (let i = 1; i < rest.length; i++) rh += `<span class="seg-pending">${rest[i]}</span>`;
      }
      $("roman-display").innerHTML = rh || "—";

    function buildComboTrack() {
      // コンボトラックのセグを生成（最大10マス）
      const track = $("combo-track");

    function renderComboGauge() {
      const pc = state.pureCombo || 0;
      $("combo-count").textContent = pc;

      // 各マス（0〜9）にそのマスが属するレベル帯の色を付ける
      // マス0〜2: Lv.1(req=3) → lit-1(黄)
      // マス3〜5: Lv.2(req=6) → lit-2(オレンジ)
      // マス6〜9: Lv.3(req=10) → lit-3(赤)
      const segColors = [
        "lit-1", "lit-1", "lit-1",   // 0,1,2 → 3連続でLv.1
        "lit-2", "lit-2", "lit-2",   // 3,4,5 → 6連続でLv.2
        "lit-3", "lit-3", "lit-3", "lit-3", // 6,7,8,9 → 10連続でLv.3
      ];

      for (let i = 0; i < 10; i++) {
        const seg = $(`combo-seg-${i}`);
        if (!seg) continue;
        seg.className = "combo-seg" + (i < pc ? " " + segColors[i] : "");
      }

      // 現在到達中のレベルラベルを表示
      let curLv = -1;
      for (let i = COMBO_LEVELS.length - 1; i >= 0; i--) {
        if (pc >= COMBO_LEVELS[i].req) { curLv = i; break; }

      // pureCombo: ミスなし・被ダメなし連続ワード数

      const pc = state.pureCombo;
      const maxHp = calcMaxHp(hero.lv);

      // 3段階コンボ回復判定（req達成時に回復、Lv.3達成後はリセットして再挑戦）
      let healAmount = 0;
      let healMsg = "";
      for (let i = COMBO_LEVELS.length - 1; i >= 0; i--) {
        if (pc === COMBO_LEVELS[i].req) {
          healAmount = COMBO_LEVELS[i].heal;
          healMsg = COMBO_LEVELS[i].label;
          // Lv.3達成でゲージリセット
          if (i === COMBO_LEVELS.length - 1) {
            setTimeout(() => { state.pureCombo = 0; renderComboGauge(); }, 600);
          }
          break;
        }
      }
      if (healAmount > 0) {
        state.playerHp = Math.min(maxHp, state.playerHp + healAmount);
        setMsg(`撃破！ -${dmg} / ${healMsg}`, "good");
        sndCombo();
        // ゲージセグを点滅させる
        for (let i = 0; i < 10; i++) {
          const seg = $(`combo-seg-${i}`);
          if (seg && seg.classList.contains("lit-1") || seg && seg.classList.contains("lit-2") || seg && seg.classList.contains("lit-3")) {
            seg.classList.add("pulse");
            setTimeout(() => seg && seg.classList.remove("pulse"), 300);
          }
        }
      } else {
        setMsg(`撃破！ -${dmg} ダメージ`, "good");
        sndAttack();
      }
      renderComboGauge();
      renderHp();

      if (state.enemyHp <= 0) {
        state.done = true; stopTimer();
        const expGain = 50 + state.stage * 30;
        addExp(expGain);
        if (state.stage + 1 >= STAGES.length) {
          sndClear(); stopBGM(); bgmPlaying = false; $("bgm-btn").textContent = "♪OFF";
          showOverlay("★ CLEAR! ★", `魔王ダークロスを打ち倒し\n世界に真の平和が訪れた！\n+${expGain}EXP 獲得！`, "► PLAY AGAIN");
        } else {
          sndDefeat();
          showOverlay(`STAGE ${state.stage + 1} CLEAR!`, `次の強敵： ${STAGES[state.stage + 1].name}\n+${expGain}EXP 獲得！`, "► NEXT STAGE");
        }
        return;
      }
      nextWord();
    }

    document.addEventListener("keydown", e => {
      if ($("overlay").style.display !== "none") { if (e.key === "Enter") $("overlay-btn").click(); return; }
      if (state.done) return;
      if (e.key.length !== 1 || !/[a-z']/i.test(e.key)) return;
      e.preventDefault(); resumeAC();
      const ch = e.key.toLowerCase();
      const kana = state.currentWord.kana;
      const newBuf = romanBuf + ch;
      const restKana = kana.slice(kanaPos);

      // newBuf が restKana に対して有効な入力かどうかを先にチェック。
      // 無効なら romanBuf は変更せず、直前まで合っていた部分から再開できるようにする。
      if (!isValidRomanPrefixForKana(newBuf, restKana)) {
        onMiss();
        return;
      }

      const result = tryConvert(newBuf, restKana);

      if (result === false) { onMiss(); return; }
      if (result === null) {
        romanBuf = newBuf; renderDisplay(); return;
      }
      // 確定
      if (!restKana.startsWith(result.kana)) { onMiss(); return; }
      kanaPos += result.kana.length;
      romanBuf = result.remaining;
      // remainingをさらに変換（っの直後に次の文字まで一気に打てた場合など）
      while (romanBuf.length > 0 && kanaPos < kana.length) {
        const r2 = tryConvert(romanBuf, kana.slice(kanaPos));
        if (!r2 || r2 === false || !kana.slice(kanaPos).startsWith(r2.kana)) break;
        kanaPos += r2.kana.length; romanBuf = r2.remaining;
      }
      renderDisplay();
      if (kanaPos >= kana.length) setTimeout(() => onComplete(), 0);
    });

    $("overlay-btn").addEventListener("click", function () {
      resumeAC();
      if (!bgmPlaying) { bgmPlaying = true; $("bgm-btn").textContent = "♪ON"; playBGM(); }
      if (this.textContent === "► NEXT STAGE") initStage(state.stage + 1);
      else {
        state.playerHp = calcMaxHp(hero.lv);
        initStage(0);
      }
    });
    $("bgm-btn").addEventListener("click", () => { resumeAC(); toggleBGM(); });

    // 起動時にセーブデータ読み込み
    loadHero();
  </script>
</body>

</html>
